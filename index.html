<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prijava v izmeno</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background-color: #f2f2f2; }
  .full { background-color: #f8d7da; } /* rdeča za polno */
  .available { background-color: #d4edda; } /* zelena za prosto */
</style>
</head>
<body>

<h1>Prijava v izmeno</h1>

<form id="shiftForm">
  <label>Ime in priimek: <input type="text" name="ime" required></label><br><br>
  <label>Datum: <input type="date" name="datum" required></label><br><br>
  <label>Izmena:
    <select name="izmena" required>
      <option value="dopoldanska">Dopoldanska</option>
      <option value="popoldanska">Popoldanska</option>
      <option value="nočna">Nočna</option>
    </select>
  </label><br><br>
  <button type="submit">Prijavi se</button>
</form>

<h2>Pregled izmen</h2>
<table id="scheduleTable">
  <thead>
    <tr>
      <th>Datum</th>
      <th>Dopoldanska</th>
      <th>Popoldanska</th>
      <th>Nočna</th>
    </tr>
  </thead>
  <tbody>
    <!-- Dinamično se bo napolnilo -->
  </tbody>
</table>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxjbUVzf0ToZf0CUEPIFYiqXF4JPjQjfXqx5kYhAupdCJfQP0DPDW6x2e33_9RmEhGu/exec";

// Omejitve izmen
function maxPeople(dateStr, shift) {
  const date = new Date(dateStr);
  const day = date.getDay(); // 0=nedelja, 6=sobota
  if (day === 0 || day === 6) { // vikend
    if (shift === "dopoldanska") return 8;
    if (shift === "popoldanska") return 7;
    return 10;
  }
  return 10; // med tednom
}

// Tabela v spominu
let schedule = {}; // { '2026-02-27': {dopoldanska: [], popoldanska: [], nočna: []} }

// Posodobi tabelo
function updateTable() {
  const tbody = document.querySelector("#scheduleTable tbody");
  tbody.innerHTML = "";
  const dates = Object.keys(schedule).sort();
  dates.forEach(date => {
    const row = document.createElement("tr");
    row.innerHTML = `<td>${date}</td>`;
    ["dopoldanska", "popoldanska", "nočna"].forEach(shift => {
      const names = schedule[date][shift] || [];
      const max = maxPeople(date, shift);
      const cell = document.createElement("td");
      cell.textContent = names.join(", ");
      cell.className = names.length >= max ? "full" : "available";
      row.appendChild(cell);
    });
    tbody.appendChild(row);
  });
}

// Dodamo datum v schedule, če še ne obstaja
function ensureDate(date) {
  if (!schedule[date]) {
    schedule[date] = {dopoldanska: [], popoldanska: [], "nočna": []};
  }
}

// Form submit handler
document.getElementById("shiftForm").addEventListener("submit", e => {
  e.preventDefault();
  const form = e.target;
  const ime = form.ime.value.trim();
  const datum = form.datum.value;
  const izmena = form.izmena.value;

  ensureDate(datum);
  const max = maxPeople(datum, izmena);

  if (schedule[datum][izmena].includes(ime)) {
    alert("Ste že prijavljeni za to izmeno.");
    return;
  }

  if (schedule[datum][izmena].length >= max) {
    alert(`Izmena je že polna (max ${max} oseb).`);
    return;
  }

  // Dodaj zaposlenega
  schedule[datum][izmena].push(ime);
  updateTable();

  // Pošlji v Google Sheet
  const formData = new FormData();
  formData.append("ime", ime);
  formData.append("datum", datum);
  formData.append("izmena", izmena);

  fetch(scriptURL, { method: "POST", body: formData })
    .then(resp => resp.text())
    .then(data => console.log("Google Sheet:", data))
    .catch(err => console.error("Napaka pri pošiljanju:", err));

  form.reset();
});

// Pripravi pregled tekočega tedna
const today = new Date();
for (let i = 0; i < 7; i++) {
  const d = new Date(today);
  d.setDate(today.getDate() + i);
  const dateStr = d.toISOString().split("T")[0];
  ensureDate(dateStr);
}
updateTable();
</script>

</body>
</html>
